<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deras Helper GUI v1.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* --- СТИЛІ СІТКИ КАЛЬКУЛЯТОРА --- */
        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 15px;
            width: 100%;
            max-width: 320px;
        }

        .calc-grid button {
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50% !important;
            width: 100% !important;
            font-size: 20px;
            padding: 0 !important;
            background: #ffffff;
            border: 1px solid #ddd;
            color: #000;
        }

        .btn-zero {
            grid-column: span 2;
            width: 100% !important;
            border-radius: 30px !important;
            aspect-ratio: auto !important;
            height: 65px;
        }

        .btn-equal {
            grid-column: span 2;
            background: linear-gradient(135deg, #00ff88, #008f4c) !important;
            color: white !important;
            border-radius: 30px !important;
            aspect-ratio: auto !important;
            height: 65px;
            border: none !important;
        }

        /* --- "ХАКЕРСЬКІ" ТЕМНІ СТИЛІ --- */
        body { 
            background: #0f0f13; 
            color: #ffffff; 
            text-align: center; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            padding-top: 40px; margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        h2 { color: #00ff88; text-shadow: 0 0 10px rgba(0,255,136,0.5); margin-bottom: 30px; }

        /* Стильні кнопки меню */
        .menu-btn { 
            background: linear-gradient(135deg, #1e1e26, #2a2a35);
            color: white; border: 1px solid #333; padding: 18px 20px; 
            margin: 10px 0; border-radius: 18px; font-size: 17px; font-weight: bold; cursor: pointer; 
            width: 90%; max-width: 350px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            outline: none; text-transform: uppercase; letter-spacing: 1px;
            display: flex; justify-content: center; align-items: center;
        }

        .menu-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,255,136,0.2);
            border-color: #00ff88;
        }

        .menu-btn:active { transform: scale(0.95); }

        /* Стиль для кнопок НАЗАД */
        .back-btn-style {
            border-left: 5px solid #555 !important;
            margin-top: 20px !important;
            background: linear-gradient(135deg, #2a2a35, #1e1e26) !important;
            color: #aaa !important;
            font-size: 14px !important;
        }

        /* Особливі кольори */
        #btn-calc-main { border-left: 5px solid #2ecc71; }
        #btn-func { border-left: 5px solid #f1c40f; }
        #btn-close { border-left: 5px solid #e74c3c; }

        .card { 
            background: #1a1a20 !important; padding: 25px 20px; border-radius: 24px; 
            width: 85%; max-width: 320px; margin: 20px auto; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; align-items: center;
            border: 1px solid #333;
        }

        input { 
            width: 90%; padding: 14px; border: 2px solid #333; border-radius: 12px; 
            font-size: 24px; margin-bottom: 15px; text-align: right; outline: none; 
            background: #000; color: #00ff88; font-family: 'Courier New', monospace;
        }

        .hidden { display: none !important; }
        .res-box { color: #00ff88; font-weight: bold; }
    </style>
</head>
<body>
    <h2 id="header-title">DERAS HELPER v1.0</h2>
    
    <audio id="click-sound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3" preload="auto"></audio>
    <audio id="success-sound" src="https://www.soundjay.com/buttons/sounds/button-09.mp3" preload="auto"></audio>

    <div id="main-menu" class="btn-container">
        <button class="menu-btn" id="btn-calc-main" onclick="showMenu('calc-menu')">КАЛЬКУЛЯТОР 🧮</button>
        <button class="menu-btn" id="btn-func" onclick="showMenu('function-menu')">Функції BAS 🛠️</button>
        <button class="menu-btn" id="btn-lang-menu" onclick="showMenu('lang-menu')">МОВА 🌍</button>
        <button class="menu-btn" id="btn-close" onclick="tg.close()">Закрити ❌</button>
    </div>

    <div id="calc-menu" class="hidden">
        <div id="calc-tools">
            <button class="menu-btn" onclick="openSimpleCalc()">Швидкий розрахунок 🔢</button>
            <button class="menu-btn" onclick="openTool('vat')">Розрахунок ПДВ (20%) 💰</button>
            <button class="menu-btn" onclick="openTool('acc')">Бухгалтерія (ПДВ) 📑</button>
            <button class="menu-btn back-btn-style" onclick="showMenu('main-menu')">НАЗАД ⬅️</button>
        </div>

        <div id="simple-calc-interface" class="hidden card">
            <input type="text" id="simple-input" placeholder="0" readonly>
            <div class="calc-grid">
                <button onclick="press('C')" style="color:#e74c3c">C</button>
                <button onclick="press('/')">/</button>
                <button onclick="press('*')">*</button>
                <button onclick="press('back')">⌫</button>
                <button onclick="press('7')">7</button><button onclick="press('8')">8</button><button onclick="press('9')">9</button><button onclick="press('-')">-</button>
                <button onclick="press('4')">4</button><button onclick="press('5')">5</button><button onclick="press('6')">6</button><button onclick="press('+')">+</button>
                <button onclick="press('1')">1</button><button onclick="press('2')">2</button><button onclick="press('3')">3</button><button onclick="press('.')">.</button>
                <button class="btn-zero" onclick="press('0')">0</button>
                <button class="btn-equal" onclick="runEval()">=</button>
            </div>
            <button class="menu-btn back-btn-style" onclick="showMenu('calc-menu')">НАЗАД ⬅️</button>
        </div>

        <div id="tool-interface" class="hidden card">
            <h4 id="tool-name" style="margin:0 0 15px 0; color:#00ff88;">Інструмент</h4>
            <input type="number" id="calc-input" placeholder="0.00">
            <div class="res-box" id="result-box" style="padding:15px; background:#000; border-radius:12px; margin-bottom:10px; width:90%;">
                <span id="result-text">Введіть суму</span>
            </div>
            <button class="menu-btn" id="action-button" style="width:100%; border-left:none; background:#00ff88; color:#000;">Порахувати</button>
            <button class="menu-btn back-btn-style" onclick="showMenu('calc-menu')">НАЗАД ⬅️</button>
        </div>
    </div>

    <div id="function-menu" class="hidden">
        <button class="menu-btn" onclick="sendTask('calculate_metrics')">Рахувати показники 📊</button>
        <button class="menu-btn" onclick="sendTask('search_issues')">Шукати проблеми 🔍</button>
        <button class="menu-btn" style="border-left:5px solid #ff4444" onclick="sendTask('stop_all')">ЗУПИНИТИ ВСЕ 🛑</button>
        <button class="menu-btn back-btn-style" onclick="showMenu('main-menu')">НАЗАД ⬅️</button>
    </div>

    <div id="lang-menu" class="hidden">
        <button class="menu-btn" onclick="selectLanguage('ua')">Українська 🇺🇦</button>
        <button class="menu-btn" onclick="selectLanguage('en')">English 🇺🇸</button>
        <button class="menu-btn" onclick="selectLanguage('pl')">Polski 🇵🇱</button>
        <button class="menu-btn" onclick="selectLanguage('de')">Deutsch 🇩🇪</button>
        <button class="menu-btn back-btn-style" onclick="showMenu('main-menu')">НАЗАД ⬅️</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = "#0f0f13";

        function playSound(id) { 
            let s = document.getElementById(id);
            if(s) { s.currentTime = 0; s.play().catch(()=>{}); }
        }

        function showMenu(id) {
            // Ховаємо абсолютно всі контейнери
            const menus = ['main-menu', 'calc-menu', 'function-menu', 'lang-menu', 'calc-tools', 'simple-calc-interface', 'tool-interface'];
            menus.forEach(mId => {
                const el = document.getElementById(mId);
                if(el) el.classList.add('hidden');
            });

            // Показуємо потрібний
            const target = document.getElementById(id);
            if(target) target.classList.remove('hidden');

            // Якщо йдемо в меню калькуляторів, показуємо вибір інструментів
            if(id === 'calc-menu') document.getElementById('calc-tools').classList.remove('hidden');
            
            playSound('click-sound');
        }

        function press(v) {
            let i = document.getElementById('simple-input');
            if(v === 'C') i.value = '';
            else if(v === 'back') i.value = i.value.slice(0, -1);
            else i.value += v;
            playSound('click-sound');
        }

        function runEval() {
            try {
                let res = eval(document.getElementById('simple-input').value);
                document.getElementById('simple-input').value = Number.isInteger(res) ? res : res.toFixed(2);
                playSound('success-sound');
            } catch { document.getElementById('simple-input').value = "Помилка"; }
        }

        function openSimpleCalc() { showMenu('simple-calc-interface'); }

        function openTool(tool) {
            document.getElementById('calc-tools').classList.add('hidden');
            document.getElementById('tool-interface').classList.remove('hidden');
            document.getElementById('tool-name').innerText = tool === 'vat' ? "ПДВ (20%)" : "Бухгалтерія";
            document.getElementById('action-button').onclick = tool === 'vat' ? calculateVAT : calculateAcc;
        }

        function calculateVAT() {
            const v = parseFloat(document.getElementById('calc-input').value);
            if(isNaN(v)) return;
            document.getElementById('result-text').innerHTML = `ПДВ: ${(v * 0.2).toFixed(2)}`;
            playSound('success-sound');
        }

        function calculateAcc() {
            const v = parseFloat(document.getElementById('calc-input').value);
            if(isNaN(v)) return;
            const vat = (v / 6).toFixed(2);
            document.getElementById('result-text').innerHTML = `ПДВ: ${vat} | Чисто: ${(v - vat).toFixed(2)}`;
            playSound('success-sound');
        }

        function sendTask(action) {
            playSound('click-sound');
            tg.sendData(JSON.stringify({action: action}));
            document.getElementById('header-title').innerText = "📡 ПЕРЕДАЧА ДАНИХ...";
            document.body.style.opacity = "0.5";
            setTimeout(() => tg.close(), 800);
        }

        function selectLanguage(l) { 
            tg.showAlert("Мову змінено на " + l.toUpperCase());
            showMenu('main-menu');
        }
    </script>
</body>
</html>

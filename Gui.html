<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #2c3e50; color: white; text-align: center; font-family: sans-serif; }
        button { 
            background-color: #3498db; color: white; border: none; 
            padding: 15px 30px; margin: 10px; border-radius: 10px; font-size: 18px;
            cursor: pointer; width: 80%;
        }
        button:active { background-color: #2980b9; }
    </style>
</head>
<body>
      <h3>Helper for BAS v1.0</h3>
    
    <div id="main-menu">
        <button onclick="sendData('language_menu')">МОВА 🌍</button>
        <button onclick="sendData('help')">ДОПОМОГА ❓</button>
        <button onclick="sendData('back_to_main')">Назад</button>
    </div>

    <div id="lang-menu" style="display:none;">
        <button onclick="sendData('set_ua')">Українська 🇺🇦</button>
        <button onclick="sendData('set_en')">English 🇺🇸</button>
        <button onclick="sendData('back_to_main')">НАЗАД ⬅️</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function sendData(command) {
            tg.sendData(command); 
            // Якщо хочеш, щоб вікно не закривалося одразу, 
            // прибери рядок tg.close()
        }
    </script>
</body>
</html>

<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #2c3e50; color: white; text-align: center; font-family: sans-serif; }
        button { 
            background-color: #3498db; color: white; border: none; 
            padding: 15px 30px; margin: 10px; border-radius: 10px; font-size: 18px;
            cursor: pointer; width: 80%;
        }
        button:active { background-color: #2980b9; }
    </style>
</head>
<body>
    <h3>Мій Mini App</h3>
    <button onclick="sendData('Привіт від кнопки 1!')">Кнопка 1</button>
    <button onclick="sendData('Я вибрав опцію 2')">Кнопка 2</button>
    <button onclick="sendData('Закрити GUI')">Закрити</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Розгортає вікно на весь екран

        function sendData(text) {
            tg.sendData(text); // Відправляє текст боту
            tg.close(); // Закриває вікно після натискання
        }
    </script>
</body>
</html>

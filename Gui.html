<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="languages.js"></script>
    
    <style>
        body { 
            background: linear-gradient(135deg, #ffffff 0%, #ffdfdf 100%);
            background-attachment: fixed;
            color: #333;
            text-align: center; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            padding-top: 30px; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }
        h3 { margin-bottom: 25px; font-weight: 600; color: #444; transition: 0.3s; }
        button { 
            background-color: rgba(255, 255, 255, 0.8);
            color: #555; border: 1px solid #ddd; padding: 16px 20px; 
            margin: 8px 0; border-radius: 15px; font-size: 17px;
            font-weight: 500; cursor: pointer; width: 90%; 
            max-width: 350px; box-shadow: 0 4px 6px rgba(0,0,0,0.03);
            transition: all 0.2s ease;
        }
        button:active { background-color: #f1f1f1; transform: scale(0.97); }
        #btn-close { color: #e74c3c; border-color: #faccc0; margin-top: 20px; }
        .back-btn { background-color: #ff7675; color: white; border: none; margin-top: 20px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <h3 id="header-title">Helper for BAS v1.0</h3>
    
    <audio id="click-sound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3" preload="auto"></audio>
    <audio id="success-sound" src="https://www.soundjay.com/buttons/sounds/button-09.mp3" preload="auto"></audio>

    <div id="main-menu">
        <button id="btn-func" onclick="showMenu('function-menu')">Функції 🛠️</button>
        <button id="btn-lang-menu" onclick="showMenu('lang-menu')">МОВА 🌍</button>
        <button id="btn-close" onclick="tg.close()">Закрити ❌</button>
    </div>

    <div id="function-menu" class="hidden">
        <button id="btn-calc" onclick="processFunction('btn-calc', 'function1')">Рахувати показники 📊</button>
        <button id="btn-search" onclick="processFunction('btn-search', 'function2')">Шукати проблеми 🔍</button>
        <button id="btn-back-func" class="back-btn" onclick="showMenu('main-menu')">НАЗАД ⬅️</button>
    </div>

    <div id="lang-menu" class="hidden">
        <button id="btn-ua" onclick="selectLanguage('ua')">Українська 🇺🇦</button>
        <button id="btn-en" onclick="selectLanguage('en')">English 🇺🇸</button>
        <button id="btn-de" onclick="selectLanguage('de')">Deutsch 🇩🇪</button>
        <button id="btn-pl" onclick="selectLanguage('pl')">Polski 🇵🇱</button>
        <button id="btn-back-lang" class="back-btn" onclick="showMenu('main-menu')">НАЗАД ⬅️</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let currentLang = 'ua';

        // Функція для звуку
        function playSound(id) {
            const sound = document.getElementById(id);
            sound.currentTime = 0;
            sound.play();
        }

        function showMenu(menuId) {
            playSound('click-sound');
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('function-menu').classList.add('hidden');
            document.getElementById('lang-menu').classList.add('hidden');
            document.getElementById(menuId).classList.remove('hidden');
        }

        function selectLanguage(langCode) {
            playSound('click-sound');
            currentLang = langCode;
            const langData = translations[langCode]; // Беремо дані з зовнішнього файлу languages.js
            for (let id in langData) {
                const el = document.getElementById(id);
                if (el) el.innerText = langData[id];
            }
        }

        function processFunction(btnId, actionName) {
            playSound('click-sound');
            const btn = document.getElementById(btnId);
            const originalText = btn.innerText;
            
            btn.innerText = translations[currentLang]['loading'];
            btn.style.opacity = "0.7";
            btn.disabled = true;

            setTimeout(() => {
                playSound('success-sound'); // Звук завершення
                btn.innerText = originalText;
                btn.style.opacity = "1";
                btn.disabled = false;
                
                const header = document.getElementById('header-title');
                header.innerText = translations[currentLang]['done'];
                header.style.color = "#27ae60";

                setTimeout(() => {
                    header.innerText = translations[currentLang]['header-title'];
                    header.style.color = "#444";
                }, 2000);

            }, 1500);
        }
    </script>
</body>
</html>

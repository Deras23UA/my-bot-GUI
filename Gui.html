<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="languages.js"></script>
    <style>
        body { 
            background: linear-gradient(135deg, #ffffff 0%, #aaaaaa 100%);
            background-attachment: fixed; color: #333; text-align: center; 
            font-family: 'Segoe UI', Roboto, sans-serif; padding-top: 40px; margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        button { 
            background-color: white; color: #444; border: 1px solid #ddd; padding: 16px 20px; 
            margin: 8px 0; border-radius: 18px; font-size: 17px; font-weight: 500; cursor: pointer; 
            width: 90%; max-width: 350px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important;
        }

        /* ЕФЕКТИ HOVER */
        #btn-calc-main:hover { background: linear-gradient(45deg, #2ecc71, #27ae60) !important; color: white !important; transform: translateY(-5px); border: none !important; }
        #btn-simple-calc:hover { background: linear-gradient(45deg, #9b59b6, #8e44ad) !important; color: white !important; transform: translateY(-5px); border: none !important; }
        #btn-vat-tool:hover { background: #3498db !important; color: white !important; transform: translateY(-3px); }
        
        /* СТИЛЬ ЦИФРОВОЇ ПАНЕЛІ */
        #simple-calc-board {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
            background: #fff; padding: 20px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 85%; max-width: 300px; margin-top: 10px;
        }
        .calc-btn { width: 100% !important; padding: 15px 0 !important; margin: 0 !important; font-size: 20px !important; border-radius: 12px !important; }
        .btn-op { background: #f39c12 !important; color: white !important; }
        .btn-eq { background: #27ae60 !important; color: white !important; grid-column: span 2; }
        #calc-display {
            grid-column: span 4; background: #2c3e50; color: #2ecc71;
            padding: 15px; border-radius: 12px; font-size: 24px; text-align: right;
            margin-bottom: 10px; font-family: 'Courier New', monospace; min-height: 30px;
            cursor: pointer; overflow: hidden;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <h2 id="header-title">Helper for BAS</h2>
    
    <div id="main-menu">
        <button id="btn-calc-main" onclick="showMenu('calc-menu')">КАЛЬКУЛЯТОР 🧮</button>
        <button id="btn-lang-menu" onclick="showMenu('lang-menu')">МОВА 🌍</button>
        <button id="btn-close" onclick="tg.close()">Закрити ❌</button>
    </div>

    <div id="calc-menu" class="hidden">
        <div id="calc-tools">
            <button id="btn-simple-calc" onclick="openSimpleCalc()">Простий калькулятор 🔢</button>
            <button id="btn-vat-tool" onclick="openTool('vat')">ПДВ (20%) 💰</button>
            <button id="btn-acc-tool" onclick="openTool('acc')">Бухгалтерія 📑</button>
            <button class="back-btn" onclick="showMenu('main-menu')">НАЗАД ⬅️</button>
        </div>

        <div id="simple-calc-interface" class="hidden">
            <div id="simple-calc-board">
                <div id="calc-display" onclick="copySimpleResult()">0</div>
                <button class="calc-btn" onclick="clearCalc()">C</button>
                <button class="calc-btn" onclick="pressCalc('/')">/</button>
                <button class="calc-btn" onclick="pressCalc('*')">*</button>
                <button class="calc-btn btn-op" onclick="deleteLast()">⌫</button>
                
                <button class="calc-btn" onclick="pressCalc('7')">7</button>
                <button class="calc-btn" onclick="pressCalc('8')">8</button>
                <button class="calc-btn" onclick="pressCalc('9')">9</button>
                <button class="calc-btn btn-op" onclick="pressCalc('-')">-</button>
                
                <button class="calc-btn" onclick="pressCalc('4')">4</button>
                <button class="calc-btn" onclick="pressCalc('5')">5</button>
                <button class="calc-btn" onclick="pressCalc('6')">6</button>
                <button class="calc-btn btn-op" onclick="pressCalc('+')">+</button>
                
                <button class="calc-btn" onclick="pressCalc('1')">1</button>
                <button class="calc-btn" onclick="pressCalc('2')">2</button>
                <button class="calc-btn" onclick="pressCalc('3')">3</button>
                <button class="calc-btn" onclick="pressCalc('.')">.</button>
                
                <button class="calc-btn" onclick="pressCalc('0')">0</button>
                <button class="calc-btn btn-eq" onclick="solveCalc()">=</button>
            </div>
            <button class="back-btn" onclick="showMenu('calc-menu')" style="margin-top:20px;">НАЗАД</button>
        </div>

        </div>

    <script>
        let tg = window.Telegram.WebApp;
        let calcExpr = "0";

        function openSimpleCalc() {
            document.getElementById('calc-tools').classList.add('hidden');
            document.getElementById('simple-calc-interface').classList.remove('hidden');
        }

        function pressCalc(v) {
            if (calcExpr === "0") calcExpr = "";
            calcExpr += v;
            updateDisplay();
        }

        function clearCalc() { calcExpr = "0"; updateDisplay(); }

        function deleteLast() {
            calcExpr = calcExpr.slice(0, -1);
            if (calcExpr === "") calcExpr = "0";
            updateDisplay();
        }

        function solveCalc() {
            try {
                calcExpr = eval(calcExpr).toString();
                updateDisplay();
            } catch (e) {
                calcExpr = "Error";
                updateDisplay();
                setTimeout(clearCalc, 1000);
            }
        }

        function updateDisplay() {
            document.getElementById('calc-display').innerText = calcExpr;
        }

        function copySimpleResult() {
            navigator.clipboard.writeText(calcExpr);
            tg.showAlert("Результат скопійовано!");
        }

        function showMenu(menuId) {
            ['main-menu', 'calc-menu', 'simple-calc-interface'].forEach(id => {
                const el = document.getElementById(id);
                if(el) el.classList.add('hidden');
            });
            document.getElementById(menuId).classList.remove('hidden');
            if(menuId === 'calc-menu') document.getElementById('calc-tools').classList.remove('hidden');
        }

        // ... Додай сюди решту функцій calculateVAT, selectLanguage тощо з попереднього коду
    </script>
</body>
</html>

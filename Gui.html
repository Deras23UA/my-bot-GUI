<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #2c3e50; color: white; text-align: center; font-family: sans-serif; padding-top: 20px; }
        button { 
            background-color: #3498db; color: white; border: none; 
            padding: 15px 30px; margin: 10px; border-radius: 10px; font-size: 18px;
            cursor: pointer; width: 80%; transition: 0.3s;
        }
        button:active { background-color: #2980b9; transform: scale(0.98); }
        .hidden { display: none; }
    </style>
</head>
<body>
    <h3>Helper for BAS v1.0</h3>
    
    <div id="main-menu">
        <button onclick="showMenu('function-menu')">Функції 🛠️</button>
        <button onclick="showMenu('lang-menu')">МОВА 🌍</button>
        <button onclick="tg.close()">Закрити ❌</button>
    </div>

    <div id="function-menu" class="hidden">
        <button onclick="sendData('function1')">Рахувати показники 📊</button>
        <button onclick="sendData('function2')">Шукати проблеми 🔍</button>
        <button onclick="showMenu('main-menu')">НАЗАД ⬅️</button>
    </div>

    <div id="lang-menu" class="hidden">
        <button onclick="sendData('set_ua')">Українська 🇺🇦</button>
        <button onclick="sendData('set_en')">English 🇺🇸</button>
        <button onclick="showMenu('main-menu')">НАЗАД ⬅️</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function showMenu(menuId) {
            // Списки всіх твоїх ID меню
            const menus = ['main-menu', 'function-menu', 'lang-menu'];
            
            menus.forEach(id => {
                const element = document.getElementById(id);
                if (element) {
                    if (id === menuId) {
                        element.classList.remove('hidden');
                    } else {
                        element.classList.add('hidden');
                    }
                }
            });
        }

        function sendData(text) {
            tg.sendData(text);
        }
    </script>
</body>
</html>

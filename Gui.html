<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="languages.js"></script>
    <style>
        body { 
            background: linear-gradient(135deg, #ffffff 0%, #f0f2f5 100%);
            background-attachment: fixed; color: #333; text-align: center; 
            font-family: 'Segoe UI', Roboto, sans-serif; padding-top: 40px; margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        button { 
            background-color: white; color: #444; border: 1px solid #ddd; padding: 16px 20px; 
            margin: 8px 0; border-radius: 18px; font-size: 17px; font-weight: 500; cursor: pointer; 
            width: 90%; max-width: 350px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important;
        }

        /* АНІМАЦІЇ */
        @keyframes gradientAnimation { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        #btn-calc-main:hover { background: linear-gradient(45deg, #2ecc71, #27ae60) !important; color: white !important; transform: translateY(-5px); border: none !important; }
        #btn-func:hover, #btn-calc:hover, #btn-search:hover { background: linear-gradient(45deg, #f1c40f, #f39c12) !important; color: white !important; transform: translateY(-5px); border: none !important; }
        #btn-simple-calc:hover { background: linear-gradient(45deg, #9b59b6, #8e44ad) !important; color: white !important; transform: translateY(-5px); border: none !important; }
        #btn-lang-menu:hover { background: linear-gradient(270deg, #ff416c, #2c78fe, #ff416c) !important; background-size: 400% 400% !important; animation: gradientAnimation 3s ease infinite !important; color: white !important; transform: translateY(-5px) scale(1.05); border: none !important; }
        #btn-close:hover { background: linear-gradient(45deg, #e74c3c, #c0392b) !important; color: white !important; transform: translateY(-5px); border: none !important; }
        .back-btn:hover { background: #34495e !important; color: white !important; }

        /* ІНТЕРФЕЙС РОЗРАХУНКУ */
        #tool-interface, #simple-calc-interface { 
            background: white; padding: 25px 20px; border-radius: 24px; width: 85%; max-width: 320px; 
            margin-top: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.07); 
        }
        input { 
            width: 90%; padding: 14px; border: 2px solid #eee; border-radius: 12px; 
            font-size: 20px; margin-bottom: 15px; text-align: center; outline: none; transition: 0.3s;
        }
        input:focus { border-color: #3498db; }
        
        #calc-result-box { 
            font-size: 22px; padding: 15px; background: #f8f9fa; border-radius: 12px; 
            margin-bottom: 15px; color: #2c3e50; min-height: 30px; cursor: pointer;
        }
        #calc-result-box b { color: #27ae60; text-decoration: underline dotted; }
        .hint { font-size: 12px; color: #95a5a6; margin-bottom: 10px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <h2 id="header-title">Helper for BAS</h2>
    
    <audio id="click-sound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3" preload="auto"></audio>
    <audio id="success-sound" src="https://www.soundjay.com/buttons/sounds/button-09.mp3" preload="auto"></audio>

    <div id="main-menu">
        <button id="btn-calc-main" onclick="showMenu('calc-menu')">КАЛЬКУЛЯТОР 🧮</button>
        <button id="btn-func" onclick="showMenu('function-menu')">Функції 🛠️</button>
        <button id="btn-lang-menu" onclick="showMenu('lang-menu')">МОВА 🌍</button>
        <button id="btn-close" onclick="tg.close()">Закрити ❌</button>
    </div>

    <div id="calc-menu" class="hidden">
        <div id="calc-tools">
            <button id="btn-simple-calc" onclick="openSimpleCalc()">Швидкий розрахунок 🔢</button>
            <button id="btn-vat-tool" onclick="openTool('vat')">Розрахунок ПДВ (20%) 💰</button>
            <button id="btn-acc-tool" onclick="openTool('acc')">Бухгалтерія (ПДВ) 📑</button>
            <button class="back-btn" onclick="showMenu('main-menu')">НАЗАД ⬅️</button>
        </div>

        <div id="simple-calc-interface" class="hidden">
            <div id="simple-hint" class="hint">Введіть приклад та натисніть Enter</div>
            <input type="text" id="simple-input" placeholder="2 + 2 * 2" autofocus>
            <div id="calc-result-box" onclick="copyResult()">
                <span id="simple-result">Результат</span>
            </div>
            <button class="back-btn" onclick="showMenu('calc-menu')">НАЗАД</button>
        </div>

        <div id="tool-interface" class="hidden">
            <h4 id="tool-name">Інструмент</h4>
            <input type="number" id="calc-input" placeholder="0.00">
            <div id="calc-result-box" id="p-res-box">
                <span id="result-text">Введіть суму</span>
            </div>
            <button id="action-button">Порахувати</button>
            <button class="back-btn" onclick="showMenu('calc-menu')" style="background:#eee; color:#666;">ВІДМІНА</button>
        </div>
    </div>

    <div id="function-menu" class="hidden">
        <button id="btn-calc" onclick="processGeneric()">Рахувати показники 📊</button>
        <button id="btn-search" onclick="processGeneric()">Шукати проблеми 🔍</button>
        <button class="back-btn" onclick="showMenu('main-menu')">НАЗАД ⬅️</button>
    </div>

    <div id="lang-menu" class="hidden">
        <button onclick="selectLanguage('ua')">Українська 🇺🇦</button>
        <button onclick="selectLanguage('en')">English 🇺🇸</button>
        <button onclick="selectLanguage('de')">Deutsch 🇩🇪</button>
        <button onclick="selectLanguage('pl')">Polski 🇵🇱</button>
        <button class="back-btn" onclick="showMenu('main-menu')">НАЗАД ⬅️</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let currentLang = 'ua';
        let lastResult = "";

        function playSound(id) { document.getElementById(id).currentTime = 0; document.getElementById(id).play().catch(()=>{}); }

        // --- ЛОГІКА ШВИДКОГО КАЛЬКУЛЯТОРА ---
        function openSimpleCalc() {
            showMenu('simple-calc-interface');
            document.getElementById('simple-input').focus();
        }

        document.getElementById('simple-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                try {
                    let expr = e.target.value.replace(',', '.'); // заміна коми на крапку для розрахунку
                    let res = eval(expr); 
                    if (res === undefined) return;
                    lastResult = Number.isInteger(res) ? res : res.toFixed(2);
                    document.getElementById('simple-result').innerHTML = `<b>${lastResult}</b> 📋`;
                    playSound('success-sound');
                } catch (err) {
                    document.getElementById('simple-result').innerText = "Помилка";
                }
            }
        });

        function copyResult() {
            if (!lastResult) return;
            navigator.clipboard.writeText(lastResult).then(() => {
                tg.showAlert("Скопійовано!");
            });
        }

        // --- МЕНЮ ТА ІНСТРУМЕНТИ ---
        function showMenu(id) {
            ['main-menu', 'calc-menu', 'simple-calc-interface', 'tool-interface', 'lang-menu', 'function-menu'].forEach(m => document.getElementById(m)?.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'calc-menu') document.getElementById('calc-tools').classList.remove('hidden');
            playSound('click-sound');
        }

        function openTool(tool) {
            document.getElementById('calc-tools').classList.add('hidden');
            document.getElementById('tool-interface').classList.remove('hidden');
            const data = translations[currentLang];
            document.getElementById('tool-name').innerText = data['btn-'+tool+'-tool'];
            document.getElementById('action-button').onclick = tool === 'vat' ? calculateVAT : calculateAcc;
            document.getElementById('calc-input').value = "";
            document.getElementById('result-text').innerText = data['calc-wait'];
        }

        function calculateVAT() {
            const v = parseFloat(document.getElementById('calc-input').value);
            if(isNaN(v)) return; playSound('success-sound');
            lastResult = (v * 0.2).toFixed(2);
            document.getElementById('result-text').innerHTML = `ПДВ: <b onclick="copyResult()">${lastResult} 📋</b>`;
        }

        function calculateAcc() {
            const v = parseFloat(document.getElementById('calc-input').value);
            if(isNaN(v)) return; playSound('success-sound');
            const vat = (v / 6).toFixed(2);
            const base = (v - vat).toFixed(2);
            document.getElementById('result-text').innerHTML = `Без ПДВ: <b onclick="copyResultText('${base}')">${base} 📋</b><br>ПДВ: <b onclick="copyResultText('${vat}')">${vat} 📋</b>`;
        }

        function copyResultText(t) { navigator.clipboard.writeText(t); tg.showAlert("Скопійовано!"); }

        function selectLanguage(l) { 
            currentLang = l; 
            const data = translations[l]; 
            for(let k in data) { 
                let el = document.getElementById(k); 
                if(el) el.innerText = data[k]; 
                if(el && el.tagName === 'INPUT') el.placeholder = data[k];
            } 
        }
        
        function processGeneric() {
            playSound('click-sound'); const h = document.getElementById('header-title'); h.innerText = "⏳...";
            setTimeout(() => { playSound('success-sound'); h.innerText = "✅ Done"; setTimeout(() => h.innerText = "Helper for BAS", 1500); }, 800);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #2c3e50; color: white; text-align: center; font-family: sans-serif; padding-top: 20px; }
        button { 
            background-color: #3498db; color: white; border: none; 
            padding: 15px 30px; margin: 10px; border-radius: 10px; font-size: 18px;
            cursor: pointer; width: 80%; transition: 0.3s;
        }
        button:active { background-color: #2980b9; transform: scale(0.98); }
        .hidden { display: none; } /* Клас для приховування елементів */
    </style>
</head>
<body>
    <h3>Helper for BAS v1.0</h3>
    
    <div id="main-menu">
        <button onclick="showMenu('function-menu')">Функції</button>
        <button onclick="showMenu('lang-menu')">МОВА 🌍</button>
        <button onclick="tg.close()">Закрити</button>
    </div>

    <div id="function-menu" class="hidden">
        <button onclick="sendData('function1')">Рахувати фінансові показники</button>
        <button onclick="sendData('function2')">Шукати проблеми в файлі</button>
        <button onclick="showMenu('main-menu')">НАЗАД ⬅️</button>
    </div>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Функція для перемикання між екранами (МОВА <-> НАЗАД)
        function showMenu(menuId) {
            // Приховуємо всі меню
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('lang-menu').classList.add('hidden');
            
            // Показуємо потрібне
            document.getElementById(menuId).classList.remove('hidden');
        }

        // Функція відправки даних боту
        function sendData(text) {
            tg.sendData(text);
            // Ми НЕ закриваємо вікно тут, щоб користувач бачив результат у чаті
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #2c3e50; color: white; text-align: center; font-family: sans-serif; padding-top: 20px; }
        button { 
            background-color: #3498db; color: white; border: none; 
            padding: 15px 30px; margin: 10px; border-radius: 10px; font-size: 18px;
            cursor: pointer; width: 80%; transition: 0.3s;
        }
        button:active { background-color: #2980b9; transform: scale(0.98); }
        .hidden { display: none !important; } /* Додав !important для надійності */
    </style>
</head>
<body>
    <h3>Helper for BAS v1.0</h3>
    
    <div id="main-menu">
        <button onclick="showMenu('function-menu')">Функції 🛠️</button>
        <button onclick="showMenu('lang-menu')">МОВА 🌍</button>
        <button onclick="tg.close()">Закрити ❌</button>
    </div>

    <div id="function-menu" class="hidden">
        <button onclick="sendData('function1')">Рахувати показники 📊</button>
        <button onclick="sendData('function2')">Шукати проблеми 🔍</button>
        <button onclick="showMenu('main-menu')">НАЗАД ⬅️</button>
    </div>

    <div id="lang-menu" class="hidden">
    <button id="btn-ua" onclick="selectLanguage('ua', 'Українська 🇺🇦 ✅')">Українська 🇺🇦</button>
    <button id="btn-en" onclick="selectLanguage('en', 'English 🇺🇸 ✅')">English 🇺🇸</button>
    <button onclick="showMenu('main-menu')">НАЗАД ⬅️</button>
</div>

<script>
    function selectLanguage(langCode, newText) {
        // 1. Відправляємо дані боту (як і раніше)
        // Використовуємо 'set_ua' або 'set_en'
        tg.sendData('set_' + langCode);

        // 2. Міняємо текст кнопки
        if (langCode === 'ua') {
            document.getElementById('btn-ua').innerText = newText;
            document.getElementById('btn-en').innerText = 'English 🇺🇸'; // Скидаємо іншу кнопку
        } else {
            document.getElementById('btn-en').innerText = newText;
            document.getElementById('btn-ua').innerText = 'Українська 🇺🇦'; // Скидаємо іншу кнопку
        }

        // 3. (Опціонально) Можна додати затримку перед закриттям, 
        // щоб користувач встиг побачити галочку
        setTimeout(() => {
            tg.close();
        }, 500); 
    }
</script>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // 1. Словник перекладів (вставляємо сюди)
        const translations = {
            'ua': {
                'header-title': 'Помічник для BAS v1.0',
                'btn-func': 'Функції 🛠️',
                'btn-lang-menu': 'МОВА 🌍',
                'btn-close': 'Закрити ❌',
                'btn-ua': 'Українська 🇺🇦 ✅',
                'btn-en': 'English 🇺🇸'
            },
            'en': {
                'header-title': 'Helper for BAS v1.0',
                'btn-func': 'Functions 🛠️',
                'btn-lang-menu': 'LANGUAGE 🌍',
                'btn-close': 'Close ❌',
                'btn-ua': 'Ukrainian 🇺🇦',
                'btn-en': 'English 🇺🇸 ✅'
            }
        };

        // 2. Функція перемикання екранів (залишаємо)
        function showMenu(menuId) {
            const menus = ['main-menu', 'function-menu', 'lang-menu'];
            menus.forEach(id => {
                const element = document.getElementById(id);
                if (element) {
                    id === menuId ? element.classList.remove('hidden') : element.classList.add('hidden');
                }
            });
        }

        // 3. НОВА функція вибору мови з перекладом
        function selectLanguage(langCode) {
            // Відправляємо дані боту в Python
            tg.sendData('set_' + langCode);

            // Отримуємо переклади для обраної мови
            const langData = translations[langCode];
            
            // Пробігаємося по всіх ID і міняємо текст
            for (let id in langData) {
                let element = document.getElementById(id);
                if (element) {
                    element.innerText = langData[id];
                }
            }

            // Закриваємо через паузу, щоб юзер побачив галочку ✅
            setTimeout(() => {
                tg.close();
            }, 600);
        }

        function sendData(text) {
            tg.sendData(text);
        }
    </script>
</body>
</html>

            tg.sendData(text);
        }
    </script>
</body>
</html>

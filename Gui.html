<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="languages.js"></script>
    <style>
        body { 
            background: linear-gradient(135deg, #ffffff 0%, #f0f2f5 100%);
            background-attachment: fixed; color: #333; text-align: center; 
            font-family: 'Segoe UI', Roboto, sans-serif; padding-top: 40px; margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        /* БАЗОВИЙ СТИЛЬ ВСІХ КНОПОК */
        button { 
            background-color: white; color: #444; border: 1px solid #ddd; padding: 16px 20px; 
            margin: 8px 0; border-radius: 18px; font-size: 17px; font-weight: 500; cursor: pointer; 
            width: 90%; max-width: 350px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important;
            outline: none;
        }

        /* УНІВЕРСАЛЬНА АНІМАЦІЯ ДЛЯ ВСІХ КНОПОК ПРИ НАВЕДЕННІ */
        button:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            background-color: #f8f9fa;
        }

        /* СПЕЦИФІЧНІ КОЛЬОРИ ДЛЯ ГОЛОВНИХ КНОПОК */
        #btn-calc-main:hover, #action-button:hover { background: linear-gradient(45deg, #2ecc71, #27ae60) !important; color: white !important; border: none !important; }
        #btn-func:hover, #btn-calc:hover, #btn-search:hover { background: linear-gradient(45deg, #f1c40f, #f39c12) !important; color: white !important; border: none !important; }
        
        /* АНІМАЦІЯ КНОПКИ МОВИ (ГРАДІЄНТ) */
        @keyframes gradientBtn { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        #btn-lang-menu:hover { 
            background: linear-gradient(270deg, #ff416c, #2c78fe, #ff416c) !important; 
            background-size: 400% 400% !important; 
            animation: gradientBtn 3s ease infinite !important; 
            color: white !important; border: none !important; 
        }

        /* АНІМАЦІЯ ДЛЯ КНОПОК У ПІДМЕНЮ (МОВИ ТА КАЛЬКУЛЯТОРИ) */
        #lang-menu button:not(.back-btn):hover, 
        #calc-tools button:not(.back-btn):hover {
            background: linear-gradient(45deg, #3498db, #2980b9) !important;
            color: white !important;
            border: none !important;
        }

        #btn-close:hover { background: linear-gradient(45deg, #e74c3c, #c0392b) !important; color: white !important; border: none !important; }
        
        /* КАРТКА РОЗРАХУНКУ */
        .card { 
            background: white !important; padding: 25px 20px; border-radius: 24px; 
            width: 85%; max-width: 320px; margin: 20px auto; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; align-items: center;
        }

        input { 
            width: 90%; padding: 14px; border: 2px solid #eee; border-radius: 12px; 
            font-size: 20px; margin-bottom: 15px; text-align: center; outline: none; 
        }
        input:focus { border-color: #3498db; }
        
        .res-box { 
            width: 90%; font-size: 20px; padding: 15px; background: #f8f9fa; 
            border-radius: 12px; margin-bottom: 15px; color: #2c3e50; min-height: 40px; cursor: pointer;
        }
        .res-box b { color: #27ae60; }
        
        .hidden { display: none !important; }
        .back-btn { background: #f1f2f6 !important; color: #57606f !important; border: none !important; }
        .back-btn:hover { background: #dfe4ea !important; color: #2f3542 !important; }
    </style>
</head>
<body>
    <h2 id="header-title">Helper for BAS</h2>
    
    <audio id="click-sound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3" preload="auto"></audio>
    <audio id="success-sound" src="https://www.soundjay.com/buttons/sounds/button-09.mp3" preload="auto"></audio>

    <div id="main-menu">
        <button id="btn-calc-main" onclick="showMenu('calc-menu')">КАЛЬКУЛЯТОР 🧮</button>
        <button id="btn-func" onclick="showMenu('function-menu')">Функції 🛠️</button>
        <button id="btn-lang-menu" onclick="showMenu('lang-menu')">МОВА 🌍</button>
        <button id="btn-close" onclick="tg.close()">Закрити ❌</button>
    </div>

    <div id="calc-menu" class="hidden">
        <div id="calc-tools">
            <button id="btn-simple-calc" onclick="openSimpleCalc()">Швидкий розрахунок 🔢</button>
            <button id="btn-vat-tool" onclick="openTool('vat')">Розрахунок ПДВ (20%) 💰</button>
            <button id="btn-acc-tool" onclick="openTool('acc')">Бухгалтерія (ПДВ) 📑</button>
            <button class="back-btn" onclick="showMenu('main-menu')">НАЗАД ⬅️</button>
        </div>

        <div id="simple-calc-interface" class="hidden card">
            <div id="simple-hint" style="font-size:12px; color:#999; margin-bottom:10px;">Введіть приклад і Enter</div>
            <input type="text" id="simple-input" placeholder="2 + 2 * 2">
            <div class="res-box" onclick="copyResult()">
                <span id="simple-result">Результат</span>
            </div>
            <button class="back-btn" onclick="showMenu('calc-menu')">НАЗАД</button>
        </div>

        <div id="tool-interface" class="hidden card">
            <h4 id="tool-name" style="margin:0 0 15px 0;">Інструмент</h4>
            <input type="number" id="calc-input" placeholder="0.00">
            <div class="res-box" onclick="copyResult()">
                <span id="result-text">Введіть суму</span>
            </div>
            <button id="action-button">Порахувати</button>
            <button class="back-btn" onclick="showMenu('calc-menu')">НАЗАД</button>
        </div>
    </div>

    <div id="function-menu" class="hidden">
        <button id="btn-calc" onclick="processGeneric()">Рахувати показники 📊</button>
        <button id="btn-search" onclick="processGeneric()">Шукати проблеми 🔍</button>
        <button class="back-btn" onclick="showMenu('main-menu')">НАЗАД ⬅️</button>
    </div>

    <div id="lang-menu" class="hidden">
        <button onclick="selectLanguage('ua')">Українська 🇺🇦</button>
        <button onclick="selectLanguage('en')">English 🇺🇸</button>
        <button onclick="selectLanguage('de')">Deutsch 🇩🇪</button>
        <button onclick="selectLanguage('pl')">Polski 🇵🇱</button>
        <button class="back-btn" onclick="showMenu('main-menu')">НАЗАД ⬅️</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let currentLang = 'ua';
        let lastRes = "";

        function playSound(id) { 
            let s = document.getElementById(id);
            if(s) { s.currentTime = 0; s.play().catch(()=>{}); }
        }

        function showMenu(id) {
            ['main-menu', 'calc-menu', 'simple-calc-interface', 'tool-interface', 'lang-menu', 'function-menu'].forEach(m => {
                let el = document.getElementById(m);
                if(el) el.classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
            if(id === 'calc-menu') document.getElementById('calc-tools').classList.remove('hidden');
            playSound('click-sound');
        }

        function openSimpleCalc() {
            document.getElementById('calc-tools').classList.add('hidden');
            document.getElementById('simple-calc-interface').classList.remove('hidden');
            setTimeout(() => document.getElementById('simple-input').focus(), 150);
        }

        document.getElementById('simple-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                try {
                    let val = e.target.value.replace(',', '.');
                    let res = eval(val);
                    lastRes = Number.isInteger(res) ? res : res.toFixed(2);
                    document.getElementById('simple-result').innerHTML = `<b>${lastRes}</b> 📋`;
                    playSound('success-sound');
                } catch { 
                    document.getElementById('simple-result').innerText = "Помилка"; 
                }
            }
        });

        function openTool(tool) {
            document.getElementById('calc-tools').classList.add('hidden');
            document.getElementById('tool-interface').classList.remove('hidden');
            const data = translations[currentLang];
            document.getElementById('tool-name').innerText = data['btn-'+tool+'-tool'];
            document.getElementById('action-button').onclick = tool === 'vat' ? calculateVAT : calculateAcc;
            document.getElementById('calc-input').value = "";
            document.getElementById('result-text').innerText = data['calc-wait'];
        }

        function calculateVAT() {
            const v = parseFloat(document.getElementById('calc-input').value);
            if(isNaN(v)) return; playSound('success-sound');
            lastRes = (v * 0.2).toFixed(2);
            document.getElementById('result-text').innerHTML = `ПДВ: <b>${lastRes} 📋</b>`;
        }

        function calculateAcc() {
            const v = parseFloat(document.getElementById('calc-input').value);
            if(isNaN(v)) return; playSound('success-sound');
            const vat = (v / 6).toFixed(2);
            const base = (v - vat).toFixed(2);
            lastRes = vat;
            document.getElementById('result-text').innerHTML = `Без ПДВ: ${base}<br>ПДВ: <b>${vat} 📋</b>`;
        }

        function copyResult() {
            if (!lastRes) return;
            navigator.clipboard.writeText(lastRes);
            tg.showAlert("Скопійовано!");
        }

        function selectLanguage(l) { 
            currentLang = l; 
            const data = translations[l]; 
            for(let k in data) { 
                let el = document.getElementById(k); 
                if(el) el.innerText = data[k]; 
            } 
            playSound('click-sound');
        }
        
        function processGeneric() {
            playSound('click-sound');
            const h = document.getElementById('header-title');
            h.innerText = "⏳...";
            setTimeout(() => { 
                playSound('success-sound'); 
                h.innerText = "✅ Done"; 
                setTimeout(() => h.innerText = "Helper for BAS", 1500); 
            }, 800);
        }
    </script>
</body>
</html>
